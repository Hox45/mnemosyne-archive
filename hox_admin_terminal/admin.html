<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ADMIN PANEL</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>ADMIN PANEL</h1>

<div class="panel">
<h2>ACCESS MANAGER</h2>
<p>ACCESS LEVEL: BLACK</p>
<p>NODE STATUS: ACTIVE</p>
</div>

<div class="panel">
<h2>EVENT CREATOR</h2>
<button onclick="alert('EVENT CREATED')">CREATE EVENT</button>
</div>

<div class="panel">
<h2>FILE GENERATOR</h2>
<button onclick="alert('FILE GENERATED')">GENERATE FILE</button>
</div>

<div class="panel">
<h2>SIGNAL MONITOR</h2>
<button onclick="alert('SIGNAL DETECTED')">SCAN SIGNAL</button>
</div>

<div class="panel">
<h2>ARCHIVE EDITOR</h2>
<button onclick="alert('ARCHIVE UPDATED')">UPDATE ARCHIVE</button>
</div>

</body>
</html>
