<!DOCTYPE html>

<style>

body{
    background:black;
    color:#00ff88;
    font-family:monospace;

    justify-content:center;
    align-items:center;

    font-size:60px;

<body>

<!-- HE IS STILL HERE -->
<!-- PROJECT MORPHEUS -->
<!-- ACCESS LEVEL REQUIRED -->
<!-- CODE: MNM-451 -->

<div class="container">

<h1>NEXUS</h1>

<div>
> <input type="text" id="codeInput" autofocus>
</div>

<br>

<div id="message">
УРОВЕНЬ ДОСТУПА: НИЗКИЙ
</div>

</div>

<script>

const input = document.getElementById("codeInput");
const message = document.getElementById("message");

function typeText(text){

    let i = 0;

    const interval = setInterval(() => {

        if(i < text.length){

            message.innerHTML += text.charAt(i);
            i++;

        } else {

            clearInterval(interval);

        }

    }, 30);

}

input.addEventListener("keydown", (e) => {

    if(e.key === "Enter"){

        const code = input.value;

        message.innerHTML = "";

        if(code === "MNM-451"){

            message.innerHTML = `
            <br>
            ПРОВЕРКА ПАМЯТИ...<br>
            ПРОВЕРКА ЛИЧНОСТИ...<br>
            <br>
            ДОСТУП РАЗРЕШЕН<br>
            <br>
            Добро пожаловать обратно, Хокс.
            `;

            setTimeout(() => {

                typeText("Подключение к узлу NEXUS...");

            }, 1000);

            setTimeout(() => {

                typeText("<br>Сигнал найден.");

            }, 2500);

            setTimeout(() => {

                typeText("<br><br>ОТКРЫТЬ АРХИВ? [Y/N]");

                document.addEventListener("keydown", (e) => {

                    if(e.key.toLowerCase() === "y"){

                        window.location.href = "hox.html";

                    }

                    if(e.key.toLowerCase() === "n"){

                        message.innerHTML += "<br><br>ДОСТУП ОТКЛОНЕН";

                    }

                });

            }, 4000);

        } else {

            message.innerHTML = `
            <br>
            ОШИБКА: КОД НЕ НАЙДЕН<br>
            ПОПЫТКА ЗАПИСАНА
            `;

        }

    }

});

</script>

</body>
</html>
