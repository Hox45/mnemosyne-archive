<script>

const input = document.getElementById("codeInput");
const message = document.getElementById("message");

function safe(text){

    const blocked = [
        "<script",
        "select ",
        "drop ",
        "insert ",
        "delete ",
        "--",
        ";",
        "xp_"
    ];

    text = text.toLowerCase();

    for(let bad of blocked){

        if(text.includes(bad)){
            return false;
        }

    }

    return true;
}

function typeText(text){

    let i = 0;

    const interval = setInterval(() => {

        if(i < text.length){

            message.innerHTML += text.charAt(i);
            i++;

        } else {

            clearInterval(interval);

        }

    }, 30);

}

input.addEventListener("keydown", (e) => {

    if(e.key === "Enter"){

        const code = input.value.trim();

        if(!safe(code)){

            message.innerHTML = `
            <br>
            SECURITY ALERT<br>
            INPUT BLOCKED
            `;

            input.value = "";
            return;
        }

        message.innerHTML = "";

        // архив
        if(code === "MNM-451"){

            message.innerHTML = `
            <br>
            ПРОВЕРКА ПАМЯТИ...<br>
            ПРОВЕРКА ЛИЧНОСТИ...<br>
            <br>
            ДОСТУП РАЗРЕШЕН<br>
            <br>
            Добро пожаловать обратно, Хокс.
            `;

            setTimeout(() => {

                typeText("Подключение к узлу NEXUS...");

            }, 1000);

            setTimeout(() => {

                typeText("<br>Сигнал найден.");

            }, 2500);

            setTimeout(() => {

                typeText("<br><br>ОТКРЫТЬ АРХИВ? [Y/N]");

                document.addEventListener("keydown", (e) => {

                    if(e.key.toLowerCase() === "y"){

                        window.location.href = "hox_os_system/index.html";

                    }

                    if(e.key.toLowerCase() === "n"){

                        message.innerHTML += "<br><br>ДОСТУП ОТКЛОНЕН";

                    }

                });

            }, 4000);

        }

        // рабочий стол
        else if(code.toLowerCase() === "desktop"){

            window.location.href = "hox_os_system/index.html";

        }

        // терминал
        else if(code.toLowerCase() === "terminal"){

            window.location.href = "hox_admin_terminal/index.html";

        }

        // сектор
        else if(code.toLowerCase() === "sector7"){

            window.location.href = "sector7.html";

        }

        // помощь
        else if(code.toLowerCase() === "help"){

            message.innerHTML = `
            <br>
            КОМАНДЫ:<br><br>

            desktop<br>
            terminal<br>
            sector7<br>
            MNM-451
            `;

        }

        else{

            message.innerHTML = `
            <br>
            ОШИБКА: КОД НЕ НАЙДЕН<br>
            ПОПЫТКА ЗАПИСАНА
            `;

        }

        input.value = "";
    }

});

</script>
