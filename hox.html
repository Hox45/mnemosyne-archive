<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEXUS</title>

<style>

body{
    background:black;
    color:#00ff88;
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    width:700px;
}

h1{
    font-size:60px;
}

input{
    background:black;
    color:#00ff88;
    border:none;
    outline:none;
    font-size:32px;
    font-family:monospace;
}

</style>

</head>

<body>

<!-- NEXUS -->
<!-- ACCESS LEVEL REQUIRED -->
<!-- NEXUS NODE: ACTIVE -->

<div class="container">

<h1>NEXUS</h1>

<div>
> <input type="text" id="codeInput" autofocus>
</div>

<br>

<div id="message">
УРОВЕНЬ ДОСТУПА: НИЗКИЙ
</div>

</div>

<script>

const input = document.getElementById("codeInput");
const message = document.getElementById("message");

input.addEventListener("keydown", (e) => {

    if(e.key === "Enter"){

        const code = input.value;

        if(code === "ACTIVE"){

            message.innerHTML = `
            <br>
            СОЕДИНЕНИЕ УСТАНОВЛЕНО<br>
            NEXUS NODE ONLINE<br>
            <br>
            ДОСТУП К СЕКТОРУ 7 РАЗРЕШЕН
            `;

            setTimeout(() => {

                window.location.href = "sector7.html";

            }, 2000);

        } else {

            message.innerHTML = `
            <br>
            ОШИБКА: КОД НЕ НАЙДЕН<br>
            ПОПЫТКА ЗАПИСАНА
            `;

        }

    }

});

</script>

</body>
</html>
